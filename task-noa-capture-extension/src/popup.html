<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Task-Noa Capture</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 360px;
        margin: 0;
        padding: 16px;
        background: #f5f4ef;
        color: #1e1d1a;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 18px;
      }
      label {
        display: block;
        margin: 12px 0 6px;
        font-size: 12px;
        font-weight: 600;
      }
      input, button, textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #c9c4b8;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 13px;
      }
      button {
        margin-top: 12px;
        background: #1f4d3d;
        color: #fff;
        border: none;
        cursor: pointer;
      }
      button.secondary {
        background: #d8d1c1;
        color: #1e1d1a;
      }
      pre {
        margin-top: 12px;
        white-space: pre-wrap;
        max-height: 180px;
        overflow: auto;
        background: #fff;
        border-radius: 8px;
        padding: 10px 12px;
      }
    </style>
  </head>
  <body>
    <h1>Capture Current Page</h1>
    <label for="backendUrl">Backend URL</label>
    <input id="backendUrl" type="text" />
    <label for="apiToken">API Token</label>
    <input id="apiToken" type="password" />
    <button id="saveSettings" class="secondary">Save Settings</button>
    <button id="captureNow">Capture Visible Data</button>
    <pre id="status">Ready.</pre>
    <script type="module" src="./popup.js"></script>
  </body>
  </html>
